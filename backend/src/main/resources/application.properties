spring.application.name=contactmanager

# Database configuration (H2 In-Memory for local development)
spring.datasource.url=jdbc:h2:mem:contactmanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA & Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console configuration (for debugging database tables)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Logging configurations
logging.level.root=INFO
logging.level.com.tenpearls.contactmanager=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# Custom App Properties (JWT configuration)
# A secure 256-bit key for HMAC-SHA256
app.jwt.secret=9a4f2c8d3b7a1e5f8g2h6j9k0l3m6n9o1p4q7r0s3t6u9v2w5x8y1z4a7b0c3d6e
# Token validity: 24 hours (86,400,000 milliseconds)
app.jwt.expiration-ms=86400000
